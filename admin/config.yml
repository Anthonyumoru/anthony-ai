backend:
name: github
repo: Anthonyumoru/anthony-ai
branch: mainmedia_folder: images
public_folder: /images
collections:
  - name: posts
   label: Posts
  folder: posts
  create: true
    slug: "{{slug}}"
  fields:
          - label: Title
        name: title
      widget: string
          - label: Body
        name: body
      widget: markdown
